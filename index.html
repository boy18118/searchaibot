<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Мужской паблик 18+</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #eceef5;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: #ffffff;
      border-radius: 22px;
      padding: 30px 24px;
      text-align: center;
      box-shadow: 0 12px 32px rgba(25, 32, 56, 0.12);
    }

    .avatar {
      width: 92px;
      height: 92px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #b5ef1f;
      margin: 0 auto 14px;
      display: block;
    }

    h1 {
      font-size: 22px;
      line-height: 1.2;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 14px;
    }

    .warning {
      background: #fff3f3;
      border: 1.5px solid #ffd0d0;
      border-radius: 12px;
      padding: 12px 16px;
      margin-bottom: 20px;
    }

    .warning-title {
      color: #e53935;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 0.3px;
      margin-bottom: 4px;
    }

    .warning-title span {
      color: #f5a623;
    }

    .warning-sub {
      color: #c62828;
      font-size: 13px;
    }

    .panel {
      background: #edf3f9;
      border-radius: 14px;
      padding: 20px 16px;
    }

    .step {
      color: #3a7bd5;
      font-weight: 700;
      font-size: 15px;
      margin-bottom: 6px;
    }

    .subtitle {
      color: #1a1a2e;
      font-weight: 700;
      font-size: 17px;
      margin-bottom: 14px;
      line-height: 1.2;
    }

    .step-mini {
      color: #3a7bd5;
      font-weight: 700;
      font-size: 15px;
      margin: 10px 0 8px;
    }

    .btn {
      display: block;
      width: 100%;
      border: none;
      border-radius: 12px;
      text-decoration: none;
      color: #fff;
      font-weight: 700;
      font-size: 16px;
      padding: 15px 12px;
      margin-bottom: 12px;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    .btn:hover {
      opacity: 0.93;
      transform: translateY(-1px);
    }

    .btn-proxy {
      background: linear-gradient(135deg, #18bf84, #11a76f);
    }

    .btn-open {
      background: linear-gradient(135deg, #4a8cfa, #2c6be9);
    }

    .btn-extra {
      background: linear-gradient(135deg, #ff6b9b, #f3407a);
      margin-bottom: 0;
    }
  </style>
</head>
<body>

      <div class="warning-sub">Без прокси/vpn бот НЕ откроется.</div>
    </div>

    <section class="panel">
      <div class="step">Шаг 1</div>
      <div class="subtitle">Search AI Bot</div>

      <a class="btn btn-open" href="tg://resolve?domain=search_new_sbot">
        Открыть Search AI Bot
      </a>

      <div class="step-mini">Шаг 2</div>

      <a class="btn btn-extra" href="https://t.me/+Xx01UWmuS4hlNjBi">
        Примеры без цензуры 🍒
      </a>

      <div class="step-mini">Шаг 3</div>

      <a
        class="btn btn-proxy"
        href="tg://proxy?server=peyk.acharbashi.info&port=4515&secret=7umk8jsddowEqNfzkSDKW25iaXNjb3R0aS55ZWt0YW5ldC5jb20"
      >
        Ускорить Telegram 🚀
      </a>
    </section>
  </main>
</body>
</html>
